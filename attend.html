<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C據點每日點名</title>
<style>
  :root{--bg:#f5f0e8;--card:#fffef9;--border:#d4c9b0;--text:#2c2416;--muted:#7a6e5f;--green:#3a7d5a;--green-light:#eaf4ee;--red:#b94040;--red-light:#fdf0f0;--blue:#2a5f8f;--accent:#c07830;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Noto Sans TC','PingFang TC',sans-serif;color:var(--text);min-height:100vh;}
  header{background:var(--text);color:#f5f0e8;padding:1rem 1.2rem;display:flex;align-items:center;gap:10px;}
  header h1{font-size:17px;font-weight:500;}
  header .date{font-size:13px;color:#b0a48a;margin-left:auto;}
  .container{max-width:680px;margin:0 auto;padding:1rem 1rem 4rem;}
  .cam-zone{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem;margin-bottom:1rem;}
  .cam-zone h2{font-size:14px;font-weight:500;color:var(--muted);margin-bottom:10px;}
  #preview{width:100%;max-height:280px;object-fit:contain;border-radius:8px;margin-bottom:10px;display:none;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;transition:all 0.15s;}
  .btn:hover{background:var(--bg);}
  .btn-cam{background:var(--text);color:#f5f0e8;border-color:var(--text);width:100%;justify-content:center;font-size:16px;padding:12px;}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green);}
  .loading{height:4px;background:#ddd;border-radius:2px;overflow:hidden;display:none;margin:8px 0;}
  .loading-bar{height:100%;background:var(--green);width:0;border-radius:2px;transition:width 0.3s;}
  .ai-box{background:var(--green-light);border:1px solid #aad4ba;border-radius:8px;padding:10px 14px;font-size:13px;display:none;margin-top:8px;white-space:pre-wrap;color:var(--text);}
  .stats-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--muted);}
  .stat b{color:var(--text);}
  .list{display:flex;flex-direction:column;gap:8px;}
  .prow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);transition:all 0.2s;}
  .prow.present{border-color:var(--green);background:var(--green-light);}
  .prow.absent{border-color:var(--red);background:var(--red-light);}
  .avatar{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg);border:1px solid var(--border);}
  .avatar-placeholder{width:48px;height:48px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;flex-shrink:0;}
  .pname{flex:1;font-size:15px;font-weight:500;}
  .ptime{font-size:12px;color:var(--green);min-width:46px;}
  .ai-tag{font-size:11px;background:var(--green);color:#fff;padding:1px 7px;border-radius:20px;margin-left:4px;}
  .note-inp{font-size:13px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;width:80px;background:var(--bg);color:var(--text);}
  .tog{padding:5px 12px;font-size:13px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:var(--bg);color:var(--muted);font-family:inherit;}
  .tog.p{background:var(--green);color:#fff;border-color:var(--green);}
  .tog.a{background:var(--red);color:#fff;border-color:var(--red);}
  .action-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .section-label{font-size:13px;color:var(--muted);margin:1rem 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
  #file-inp{display:none;}
  .copy-btn{margin-top:1rem;}

  #cam-video{width:100%;max-height:300px;border-radius:8px;display:none;background:#000;margin-bottom:8px;}
  .cam-status{font-size:13px;color:var(--muted);padding:8px 0;text-align:center;}
  .btn-stop{background:var(--red);color:#fff;border-color:var(--red);width:auto;font-size:15px;padding:10px 20px;}
  .btn-snap{background:var(--blue);color:#fff;border-color:var(--blue);font-size:14px;padding:9px 16px;}
  .scan-badge{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
  <h1>C據點每日點名</h1>
  <span class="date" id="hdr-date"></span>
</header>
<div class="container">

  <div class="cam-zone">
    <h2>相機掃描點名</h2>
    <div id="cam-status" class="cam-status">📷 尚未開啟相機</div>
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas" style="display:none"></canvas>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      <button class="btn btn-cam" id="btn-start" onclick="startScan()">▶ 開始掃描</button>
      <button class="btn btn-stop" id="btn-stop" onclick="stopScan()" style="display:none">■ 停止</button>
      <button class="btn btn-snap" id="btn-snap" onclick="snapNow()" style="display:none">📷 立刻辨識</button>
    </div>
    <div class="loading" id="loading"><div class="loading-bar" id="lbar"></div></div>
    <div class="ai-box" id="ai-box"></div>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="section-label">名單（可手動調整）</div>
  <div class="action-bar">
    <button class="btn" onclick="markAll('present')" style="font-size:13px">全部出席</button>
    <button class="btn" onclick="resetAll()" style="font-size:13px">清除全部</button>
  </div>
  <div class="list" id="list"></div>
  <button class="btn btn-green copy-btn" onclick="copySummary()">複製今日摘要</button>
</div>

let records = {};
let scanInterval = null;
let stream = null;

function todayROC(){
  const d=new Date();
  return `民國${d.getFullYear()-1911}年${d.getMonth()+1}月${d.getDate()}日`;
}
document.getElementById('hdr-date').textContent = todayROC();

function renderList(){
  const el=document.getElementById('list');
  el.innerHTML=PEOPLE.map((p,i)=>{
    const r=records[p.name]||{};
    const rc=r.status==='present'?'present':r.status==='absent'?'absent':'';
    const pCls=r.status==='present'?'p':'';
    const aCls=r.status==='absent'?'a':'';
    const avatar=p.photo
      ? `<img class="avatar" src="${p.photo}" alt="${p.name}"/>`
      : `<div class="avatar-placeholder">👤</div>`;
    const aiTag=r.byAI?'<span class="ai-tag">AI</span>':'';
    return `<div class="prow ${rc}" id="pr${i}">
      ${avatar}
      <span class="pname">${p.name}${aiTag}</span>
      <span class="ptime" id="pt${i}">${r.time?'⏱'+r.time:''}</span>
      <input class="note-inp" placeholder="備註" value="${r.note||''}" oninput="setNote(${i},this.value)"/>
      <button class="tog ${pCls}" onclick="mark(${i},'present')">出席</button>
      <button class="tog ${aCls}" onclick="mark(${i},'absent')">缺席</button>
    </div>`;
  }).join('');
}

function mark(i,status,byAI=false){
  const name=PEOPLE[i].name;
  if(!records[name]) records[name]={};
  if(!byAI && records[name].status===status){
    records[name]={};
  } else {
    const now=new Date();
    records[name]={
      status,
      time: status==='present'?now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'):null,
      note: records[name].note||'',
      byAI
    };
  }
  updateRow(i); updateStats();
}

function updateRow(i){
  const r=records[PEOPLE[i].name]||{};
  const row=document.getElementById('pr'+i); if(!row)return;
  row.className='prow '+(r.status||'');
  const togs=row.querySelectorAll('.tog');
  togs[0].className='tog'+(r.status==='present'?' p':'');
  togs[1].className='tog'+(r.status==='absent'?' a':'');
  document.getElementById('pt'+i).textContent=r.time?'⏱'+r.time:'';
  const nameEl=row.querySelector('.pname');
  nameEl.innerHTML=PEOPLE[i].name+(r.byAI?'<span class="ai-tag">AI</span>':'');
}

function setNote(i,v){ if(!records[PEOPLE[i].name])records[PEOPLE[i].name]={}; records[PEOPLE[i].name].note=v; }
function markAll(s){ PEOPLE.forEach((_,i)=>{ if(!records[PEOPLE[i].name]?.status) mark(i,s); }); }
function resetAll(){ if(!confirm('確定清除？'))return; records={}; renderList(); updateStats(); }

function updateStats(){
  let p=0,a=0;
  PEOPLE.forEach(({name})=>{ const s=records[name]?.status; if(s==='present')p++; else if(s==='absent')a++; });
  document.getElementById('stats-row').innerHTML=`
    <div class="stat">出席 <b style="color:var(--green)">${p}</b></div>
    <div class="stat">缺席 <b style="color:var(--red)">${a}</b></div>
    <div class="stat">未記錄 <b>${PEOPLE.length-p-a}</b></div>
    <div class="stat">共 <b>${PEOPLE.length}</b> 人</div>`;
}

// ─── Camera scan ───────────────────────────────────────────────
async function startScan(){
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('cam-video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = '';
    document.getElementById('btn-snap').style.display = '';
    setStatus('<span class="scan-badge"></span>掃描中，每 4 秒自動辨識一次…');
    scanInterval = setInterval(captureAndAnalyze, 4000);
    // First scan after 1.5s (let camera settle)
    setTimeout(captureAndAnalyze, 1500);
  } catch(e) {
    setStatus('❌ 無法開啟相機：' + e.message);
  }
}

function stopScan(){
  if(scanInterval){ clearInterval(scanInterval); scanInterval=null; }
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('cam-video').style.display='none';
  document.getElementById('btn-start').style.display='';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-snap').style.display='none';
  setStatus('✅ 掃描已停止，請手動補缺席或備註');
}

function snapNow(){
  captureAndAnalyze();
}

function captureAndAnalyze(){
  const video = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  if(!video.srcObject || video.readyState < 2) return;
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  const b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  analyzePhoto(b64);
}

function setStatus(html){
  document.getElementById('cam-status').innerHTML = html;
}

async function analyzePhoto(b64){
  const loading=document.getElementById('loading');
  const lbar=document.getElementById('lbar');
  const aiBox=document.getElementById('ai-box');
  loading.style.display='block'; aiBox.style.display='none';
  let w=0; const timer=setInterval(()=>{ w=Math.min(w+3,90); lbar.style.width=w+'%'; },200);

  const refData = PEOPLE.filter(p=>p.photo).map(p=>({name:p.name, photo:p.photo}));
  const msgContent = [];
  refData.forEach(p=>{
    msgContent.push({type:'text', text:`參考照 - ${p.name}：`});
    msgContent.push({type:'image', source:{type:'base64', media_type:'image/jpeg', data:p.photo.split(',')[1]}});
  });
  msgContent.push({type:'text', text:`以上是長輩的參考照。下面是今日拍攝的照片，請比對辨識哪些長輩出現在照片中。
請回覆純 JSON，格式：{"present":["姓名1","姓名2"],"uncertain":[],"notes":"說明"}
不要加其他文字。`});
  msgContent.push({type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}});

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:msgContent}]})
    });
    const data=await resp.json();
    clearInterval(timer); lbar.style.width='100%';
    setTimeout(()=>loading.style.display='none',400);
    const text=data.content?.map(c=>c.text||'').join('').trim();
    let parsed;
    try{ parsed=JSON.parse(text.replace(/```json|```/g,'').trim()); }catch(e){}
    aiBox.style.display='block';
    if(parsed){
      const present=parsed.present||[];
      let matched=0;
      PEOPLE.forEach((p,i)=>{
        if(present.some(n=>n.includes(p.name)||p.name.includes(n))){
          mark(i,'present',true); matched++;
        }
      });
      aiBox.textContent=`✅ 辨識完成：找到 ${present.length} 位（${present.join('、')}）\n自動標記出席：${matched} 位${parsed.uncertain?.length?' | 不確定：'+parsed.uncertain.join('、'):''}
${parsed.notes||''}`;
    } else {
      aiBox.textContent='AI 回覆（無法解析）：\n'+text;
    }
  } catch(err){
    clearInterval(timer); loading.style.display='none';
    aiBox.style.display='block'; aiBox.textContent='連線失敗：'+err.message;
  }
}

function copySummary(){
  const pList=PEOPLE.filter(p=>records[p.name]?.status==='present');
  const aList=PEOPLE.filter(p=>records[p.name]?.status==='absent');
  const nList=PEOPLE.filter(p=>!records[p.name]?.status);
  let txt=`C據點出席紀錄\n${todayROC()}\n\n`;
  txt+=`出席（${pList.length}人）：\n`;
  pList.forEach(p=>{const r=records[p.name];txt+=`  ${p.name}${r.time?' '+r.time:''}${r.note?' 【'+r.note+'】':''}\n`;});
  txt+=`\n缺席（${aList.length}人）：\n`;
  aList.forEach(p=>{const r=records[p.name];txt+=`  ${p.name}${r.note?' 【'+r.note+'】':''}\n`;});
  if(nList.length){txt+=`\n未記錄（${nList.length}人）：\n`;nList.forEach(p=>txt+=`  ${p.name}\n`);}
  navigator.clipboard.writeText(txt).then(()=>alert('已複製！')).catch(()=>alert(txt));
}

renderList(); updateStats();
</script>
