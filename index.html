<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C據點長輩建檔工具</title>
<script src="./face-api.min.js"></script>
<style>
  :root{--bg:#f5f0e8;--card:#fffef9;--border:#d4c9b0;--text:#2c2416;--muted:#7a6e5f;--green:#3a7d5a;--gl:#eaf4ee;--red:#b94040;--accent:#c07830;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Noto Sans TC','PingFang TC',sans-serif;color:var(--text);}
  header{background:var(--text);color:#f5f0e8;padding:1rem 1.2rem;display:flex;align-items:center;gap:10px;}
  header h1{font-size:17px;font-weight:500;}
  header .sub{font-size:12px;color:#b0a48a;margin-left:auto;}
  .wrap{max-width:640px;margin:0 auto;padding:1rem 1rem 4rem;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem;margin-bottom:1rem;}
  .lbl{font-size:13px;color:var(--muted);margin-bottom:6px;}
  .step{display:inline-block;background:var(--accent);color:#fff;font-size:11px;padding:1px 8px;border-radius:20px;margin-right:6px;}
  textarea{width:100%;height:110px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);resize:vertical;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;}
  .btn-dark{background:var(--text);color:#f5f0e8;border-color:var(--text);}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green);font-size:15px;padding:12px 24px;width:100%;}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;}
  .stats{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  .chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--muted);}
  .chip b{color:var(--text);}
  .pcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
  .pcard.ok{border-color:var(--green);background:var(--gl);}
  .photo-label{width:64px;height:64px;border-radius:8px;border:2px dashed var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;font-size:10px;color:var(--muted);text-align:center;gap:3px;}
  .photo-label img{width:100%;height:100%;object-fit:cover;}
  .photo-label input{display:none;}
  .pname{flex:1;font-size:15px;font-weight:500;}
  .pst{font-size:12px;color:var(--muted);}
  .pst.ok{color:var(--green);}
  .del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px 6px;}
  .export-box{background:#eaf2fa;border:1px solid #b5d0e8;border-radius:10px;padding:1.2rem;margin-top:1rem;}
  .export-box h3{font-size:15px;color:#2a5f8f;margin-bottom:6px;}
  .export-box p{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .mstatus{font-size:13px;padding:8px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);margin-bottom:1rem;color:var(--muted);}
  .mstatus.ok{border-color:var(--green);color:var(--green);background:var(--gl);}
  .mstatus.err{border-color:var(--red);color:var(--red);background:#fdf0f0;}
</style>
</head>
<body>
<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
  <h1>C據點長輩建檔工具</h1>
  <span class="sub">face-api 本地版</span>
</header>
<div class="wrap">
  <div class="mstatus" id="mstatus">⏳ 正在載入人臉辨識模型...</div>

  <div class="card">
    <div class="lbl"><span class="step">步驟一</span>貼上長輩名單（每行一位）</div>
    <textarea id="ni" placeholder="王大明
李小花
陳阿嬤
張伯伯"></textarea>
    <div style="margin-top:8px"><button class="btn btn-dark" onclick="load()">載入名單</button></div>
    <div class="hint">載入後點每人頭像拍照，系統自動擷取人臉特徵</div>
  </div>

  <div id="psec" style="display:none">
    <div class="lbl" style="margin-bottom:8px"><span class="step">步驟二</span>點頭像為每位長輩拍照（需清楚正面）</div>
    <div class="stats" id="stats"></div>
    <div id="plist"></div>
  </div>

  <div class="export-box" id="expbox" style="display:none">
    <h3>步驟三：下載點名系統</h3>
    <p>人臉特徵向量已嵌入。下載後上傳 GitHub 為 <b>attend.html</b>，手機每天開固定網址自動掃描點名，完全離線運作。</p>
    <button class="btn btn-green" onclick="gen()">⬇ 下載點名系統 HTML</button>
  </div>
</div>

<canvas id="hidden-canvas" style="display:none"></canvas>

<script>
// 模型路徑與副檔名設定
const MODEL_URL = './models';
// 攔截 fetch，讓模型所有請求（含 .json 和無副檔名 shard）都改成 .htm
const _origFetch = window.fetch;
window.fetch = function(url, opts) {
  if(typeof url === 'string' && url.includes('/models/')) {
    if(url.endsWith('.json')) {
      url = url.replace('.json', '.htm');
    } else if(!url.endsWith('.htm') && !url.endsWith('.bin')) {
      url = url + '.htm';
    }
  }
  return _origFetch(url, opts);
};

let people = [], descriptors = {}, photos = {};
let modelsReady = false;

async function loadModels() {
  const st = document.getElementById('mstatus');
  try {
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
    ]);
    modelsReady = true;
    st.textContent = '✅ 人臉辨識模型已就緒，可以開始建檔';
    st.className = 'mstatus ok';
  } catch(e) {
    st.textContent = '❌ 模型載入失敗：' + e.message;
    st.className = 'mstatus err';
    console.error(e);
  }
}
loadModels();

function load() {
  const raw = document.getElementById('ni').value.trim();
  if(!raw){ alert('請先貼上名單'); return; }
  const names = raw.split(/[\n,，、]+/).map(s=>s.trim()).filter(Boolean);
  if(!names.length){ alert('找不到名字'); return; }
  people = names; descriptors = {}; photos = {};
  document.getElementById('psec').style.display = 'block';
  document.getElementById('expbox').style.display = 'block';
  render();
}

function render() {
  document.getElementById('plist').innerHTML = people.map((name,i) => {
    const has = !!descriptors[name];
    return `<div class="pcard ${has?'ok':''}" id="pc${i}">
      <label class="photo-label">
        ${photos[name]
          ? `<img src="${photos[name]}" alt="${name}"/>`
          : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>拍照</span>`}
        <input type="file" accept="image/*" capture="environment" onchange="onPhoto(event,${i})">
      </label>
      <div style="flex:1">
        <div class="pname">${name}</div>
        <div class="pst ${has?'ok':''}">${has?'✓ 特徵已建立':'未拍照'}</div>
      </div>
      <button class="del" onclick="rm(${i})">×</button>
    </div>`;
  }).join('');
  const done = people.filter(n=>descriptors[n]).length;
  document.getElementById('stats').innerHTML = `
    <div class="chip">總人數 <b>${people.length}</b></div>
    <div class="chip">已建特徵 <b style="color:var(--green)">${done}</b></div>
    <div class="chip">待拍 <b style="color:var(--accent)">${people.length-done}</b></div>`;
}

async function onPhoto(e, i) {
  const file = e.target.files[0]; if(!file) return;
  if(!modelsReady){ alert('模型尚未載入完成，請稍候再試'); return; }
  const name = people[i];
  const img = await loadImg(file);
  photos[name] = compressImg(img, 300);
  const det = await faceapi
    .detectSingleFace(img, new faceapi.SsdMobilenetv1Options({minConfidence:0.3}))
    .withFaceLandmarks().withFaceDescriptor();
  if(!det) {
    alert(`「${name}」未偵測到人臉，請重拍清楚正面照`);
    photos[name] = null; render(); return;
  }
  descriptors[name] = Array.from(det.descriptor);
  render();
}

function loadImg(file) {
  return new Promise(res => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.src = url;
  });
}

function compressImg(img, max) {
  const c = document.getElementById('hidden-canvas');
  let w=img.width, h=img.height;
  if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
  c.width=w; c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  return c.toDataURL('image/jpeg',0.78);
}

function rm(i) {
  if(!confirm(`移除「${people[i]}」？`)) return;
  delete descriptors[people[i]]; delete photos[people[i]];
  people.splice(i,1); render();
}

function gen() {
  const data = people.map(n=>({name:n, photo:photos[n]||null, descriptor:descriptors[n]||null}));
  const noFace = data.filter(d=>!d.descriptor).map(d=>d.name);
  if(noFace.length && !confirm(`以下長輩未建立人臉特徵，只能手動點名：\n${noFace.join('、')}\n\n繼續下載？`)) return;
  const blob = new Blob([buildAttend(data)], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'attend.html'; a.click();
}

function buildAttend(data) {
  const json = JSON.stringify(data);
  return `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C據點每日點名</title>
<script src="./face-api.min.js"><\/script>
<style>
:root{--bg:#f5f0e8;--card:#fffef9;--border:#d4c9b0;--text:#2c2416;--muted:#7a6e5f;--green:#3a7d5a;--gl:#eaf4ee;--red:#b94040;--rl:#fdf0f0;--accent:#c07830;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Noto Sans TC','PingFang TC',sans-serif;color:var(--text);overflow-x:hidden;}
header{background:var(--text);color:#f5f0e8;padding:.9rem 1.2rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
header h1{font-size:16px;font-weight:500;}
.dt{font-size:12px;color:#b0a48a;margin-left:auto;}
.wrap{max-width:680px;margin:0 auto;padding:.8rem 1rem 4rem;}
.mbar{font-size:13px;padding:7px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);margin-bottom:.8rem;color:var(--muted);}
.mbar.ok{border-color:var(--green);color:var(--green);background:var(--gl);}
.mbar.err{border-color:var(--red);color:var(--red);background:#fdf0f0;}
.scan-zone{background:#111;border-radius:12px;overflow:hidden;margin-bottom:.8rem;position:relative;}
#video{width:100%;display:block;max-height:55vw;object-fit:cover;}
#faceCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:10px;pointer-events:none;}

.sbtns{display:flex;gap:8px;pointer-events:all;}
.sbtn{padding:8px 18px;border-radius:8px;border:none;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;}
.sbtn-start{background:var(--green);color:#fff;}
.sbtn-stop{background:#555;color:#fff;}
.ring{position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:#4f4;animation:pulse 1s infinite;display:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.stats{display:flex;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--muted);}
.chip b{color:var(--text);}

.abar{display:flex;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;}
.btn-g{background:var(--green);color:#fff;border-color:var(--green);margin-top:.8rem;width:100%;justify-content:center;font-size:14px;padding:11px;}
.prow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);margin-bottom:6px;transition:all .2s;}
.prow.P{border-color:var(--green);background:var(--gl);}
.prow.A{border-color:var(--red);background:var(--rl);}
.av{width:44px;height:44px;border-radius:7px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);}
.av-ph{width:44px;height:44px;border-radius:7px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pn{flex:1;font-size:14px;font-weight:500;}
.pt{font-size:11px;color:var(--green);min-width:40px;}
.aitag{font-size:10px;background:var(--green);color:#fff;padding:1px 5px;border-radius:20px;margin-left:3px;vertical-align:middle;}
.ni{font-size:12px;padding:3px 7px;border:1px solid var(--border);border-radius:6px;width:68px;background:var(--bg);color:var(--text);font-family:inherit;}
.tog{padding:5px 10px;font-size:12px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:var(--bg);color:var(--muted);font-family:inherit;}
.tog.p{background:var(--green);color:#fff;border-color:var(--green);}
.tog.a{background:var(--red);color:#fff;border-color:var(--red);}
<\/style>
<\/head>
<body>
<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
  <h1>C據點每日點名</h1>
  <span class="dt" id="hdt"><\/span>
<\/header>
<div class="wrap">
  <div class="mbar" id="mbar">⏳ 載入人臉辨識模型中...<\/div>
  <div class="scan-zone">
    <video id="video" autoplay playsinline muted><\/video>
    <canvas id="faceCanvas"><\/canvas>
    <div class="overlay">
      <div class="sstatus" id="sstatus">請等模型載入完成<\/div>
      <div class="sbtns">
        <button class="sbtn sbtn-start" id="btn-start" onclick="startScan()" disabled>▶ 開始掃描<\/button>
        <button class="sbtn sbtn-stop" id="btn-stop" onclick="stopScan()" style="display:none">■ 停止<\/button>
      <\/div>
    <\/div>
    <div class="ring" id="ring"><\/div>
  <\/div>
  <div class="stats" id="stats"><\/div>
  <div class="sec">名單（可手動調整）<\/div>
  <div class="abar">
    <button class="btn" onclick="markAll()">全部出席<\/button>
    <button class="btn" onclick="resetAll()">清除全部<\/button>
  <\/div>
  <div id="list"><\/div>
  <button class="btn btn-g" onclick="copySummary()">複製今日摘要<\/button>
<\/div>

<script>
const PEOPLE = ${json};
const MODEL_URL = './models';
const THRESHOLD = 0.5;
const INTERVAL = 2500;
let R={}, stream=null, scanTimer=null, scanning=false, modelsReady=false, matcher=null;

// 攔截 fetch，讓模型 shard 檔加上 .htm
const _of = window.fetch;
window.fetch = function(url, opts) {
  if(typeof url==='string' && url.includes('/models/')) {
    if(url.endsWith('.json')) url = url.replace('.json', '.htm');
    else if(!url.endsWith('.htm') && !url.endsWith('.bin')) url = url + '.htm';
  }
  return _of(url, opts);
};

function roc(){const d=new Date();return \`民國\${d.getFullYear()-1911}年\${d.getMonth()+1}月\${d.getDate()}日\`;}
document.getElementById('hdt').textContent = roc();

async function initModels() {
  const bar = document.getElementById('mbar');
  try {
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
    ]);
    const labeled = PEOPLE.filter(p=>p.descriptor)
      .map(p=>new faceapi.LabeledFaceDescriptors(p.name,[new Float32Array(p.descriptor)]));
    if(labeled.length) matcher = new faceapi.FaceMatcher(labeled, THRESHOLD);
    modelsReady = true;
    bar.textContent = \`✅ 模型就緒，已建特徵 \${labeled.length} 人\`;
    bar.className = 'mbar ok';
    document.getElementById('btn-start').disabled = false;
  } catch(e) {
    bar.textContent = '❌ 模型載入失敗：' + e.message;
    bar.className = 'mbar err';
    console.error(e);
  }
}
initModels();

async function startScan() {
  if(!modelsReady){ alert('模型尚未就緒'); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
    const vid = document.getElementById('video');
    vid.srcObject = stream;
    await new Promise(r=>vid.onloadedmetadata=r);
    const fc = document.getElementById('faceCanvas');
    fc.width=vid.videoWidth; fc.height=vid.videoHeight;
    scanning=true;
    document.getElementById('btn-start').style.display='none';
    document.getElementById('btn-stop').style.display='';
    document.getElementById('ring').style.display='';
    setS('📡 掃描中，自動辨識...');
    scanTimer = setInterval(doScan, INTERVAL);
    setTimeout(doScan, 800);
  } catch(e){ setS('無法開啟相機：'+e.message); }
}

function stopScan() {
  scanning=false;
  if(scanTimer){clearInterval(scanTimer);scanTimer=null;}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  document.getElementById('video').srcObject=null;
  document.getElementById('btn-start').style.display='';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('ring').style.display='none';
  const fc=document.getElementById('faceCanvas');
  fc.getContext('2d').clearRect(0,0,fc.width,fc.height);
  setS('已停止');
}

function setS(msg){document.getElementById('sstatus').textContent=msg;}

async function doScan() {
  if(!scanning||!matcher) return;
  const vid=document.getElementById('video');
  if(!vid.videoWidth) return;
  try {
    const dets = await faceapi
      .detectAllFaces(vid, new faceapi.SsdMobilenetv1Options({minConfidence:0.4}))
      .withFaceLandmarks().withFaceDescriptors();
    const fc=document.getElementById('faceCanvas');
    const ctx=fc.getContext('2d');
    ctx.clearRect(0,0,fc.width,fc.height);
    const sized=faceapi.resizeResults(dets,{width:vid.videoWidth,height:vid.videoHeight});
    const found=[];
    sized.forEach(det=>{
      const match=matcher.findBestMatch(det.descriptor);
      const known=match.label!=='unknown'&&match.distance<THRESHOLD;
      const box=det.detection.box;
      ctx.strokeStyle=known?'#3a7d5a':'#aaa';
      ctx.lineWidth=2;
      ctx.strokeRect(box.x,box.y,box.width,box.height);
      const label=known?match.label:'未知';
      const tw=ctx.measureText(label).width+10;
      ctx.fillStyle=known?'#3a7d5a':'#555';
      ctx.fillRect(box.x,box.y-24,tw,24);
      ctx.fillStyle='#fff';
      ctx.font='bold 14px sans-serif';
      ctx.fillText(label,box.x+5,box.y-6);
      if(known){
        found.push(match.label);
        const idx=PEOPLE.findIndex(p=>p.name===match.label);
        if(idx>=0&&R[match.label]?.s!=='P') mk(idx,'P',true);
      }
    });
    if(!dets.length) setS('未偵測到人臉，請對準長輩');
    else setS(\`偵測到 \${dets.length} 張臉\${found.length?' ✅ '+found.join('、'):' — 無符合'}\`);
  } catch(e){ setS('辨識錯誤：'+e.message); }
}

function rl(){
  document.getElementById('list').innerHTML=PEOPLE.map((p,i)=>{
    const r=R[p.name]||{};
    const av=p.photo?\`<img class="av" src="\${p.photo}" alt="\${p.name}"/>\`:\`<div class="av-ph">👤<\/div>\`;
    return \`<div class="prow \${r.s||''}" id="r\${i}">
      \${av}
      <span class="pn">\${p.name}\${r.ai?'<span class="aitag">AI<\/span>':''}<\/span>
      <span class="pt" id="t\${i}">\${r.t?'⏱'+r.t:''}<\/span>
      <input class="ni" placeholder="備註" value="\${r.n||''}" oninput="sn(\${i},this.value)"/>
      <button class="tog \${r.s==='P'?'p':''}" onclick="mk(\${i},'P')">出席<\/button>
      <button class="tog \${r.s==='A'?'a':''}" onclick="mk(\${i},'A')">缺席<\/button>
    <\/div>\`;
  }).join('');
}

function mk(i,s,ai=false){
  const nm=PEOPLE[i].name;
  if(!R[nm])R[nm]={};
  if(!ai&&R[nm].s===s){R[nm]={n:R[nm].n||''};}
  else{
    const d=new Date();
    R[nm]={s,t:s==='P'?d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'):null,n:R[nm].n||'',ai};
  }
  ur(i);us();
}
function ur(i){
  const r=R[PEOPLE[i].name]||{};
  const row=document.getElementById('r'+i);if(!row)return;
  row.className='prow '+(r.s||'');
  const tg=row.querySelectorAll('.tog');
  tg[0].className='tog'+(r.s==='P'?' p':'');
  tg[1].className='tog'+(r.s==='A'?' a':'');
  document.getElementById('t'+i).textContent=r.t?'⏱'+r.t:'';
  row.querySelector('.pn').innerHTML=PEOPLE[i].name+(r.ai?'<span class="aitag">AI<\/span>':'');
}
function sn(i,v){if(!R[PEOPLE[i].name])R[PEOPLE[i].name]={};R[PEOPLE[i].name].n=v;}
function markAll(){PEOPLE.forEach((_,i)=>{if(!R[PEOPLE[i].name]?.s)mk(i,'P');});}
function resetAll(){if(!confirm('確定清除？'))return;R={};rl();us();}
function us(){
  let p=0,a=0;
  PEOPLE.forEach(({name})=>{const s=R[name]?.s;if(s==='P')p++;else if(s==='A')a++;});
  document.getElementById('stats').innerHTML=\`<div class="chip">出席 <b style="color:var(--green)">\${p}<\/b><\/div><div class="chip">缺席 <b style="color:var(--red)">\${a}<\/b><\/div><div class="chip">未記錄 <b>\${PEOPLE.length-p-a}<\/b><\/div><div class="chip">共 <b>\${PEOPLE.length}<\/b> 人<\/div>\`;
}
function copySummary(){
  const pl=PEOPLE.filter(p=>R[p.name]?.s==='P');
  const al=PEOPLE.filter(p=>R[p.name]?.s==='A');
  const nl=PEOPLE.filter(p=>!R[p.name]?.s);
  let t=\`C據點出席紀錄\\n\${roc()}\\n\\n出席（\${pl.length}人）：\\n\`;
  pl.forEach(p=>{const r=R[p.name];t+=\`  \${p.name}\${r.t?' '+r.t:''}\${r.n?' 【'+r.n+'】':''}\\n\`;});
  t+=\`\\n缺席（\${al.length}人）：\\n\`;
  al.forEach(p=>{const r=R[p.name];t+=\`  \${p.name}\${r.n?' 【'+r.n+'】':''}\\n\`;});
  if(nl.length){t+=\`\\n未記錄（\${nl.length}人）：\\n\`;nl.forEach(p=>t+=\`  \${p.name}\\n\`);}
  navigator.clipboard.writeText(t).then(()=>alert('已複製！')).catch(()=>alert(t));
}
rl();us();
<\/script>
<\/body>
<\/html>`;
}
</script>
</body>
</html>
