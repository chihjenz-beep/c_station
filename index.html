<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>學員出席打卡系統</title>
<script src="https://cdn.jsdelivr.net/npm/face-api.js/dist/face-api.min.js"></script>
<style>
:root {
  --bg:#0f1923; --card:#1a2a3a; --accent:#00c9a7; --accent2:#0099ff;
  --warn:#ff6b6b; --text:#e8f0fe; --muted:#8a9bb0; --border:#2a3f55;
  --success:#00e676; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Microsoft JhengHei',sans-serif;min-height:100vh;padding-bottom:80px;}

header{background:linear-gradient(135deg,#0d2137,#1a3a5c);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
header h1{font-size:17px;font-weight:700;color:var(--accent);}
.sdot{width:10px;height:10px;border-radius:50%;background:var(--warn);animation:pulse 1.5s infinite;}
.sdot.ok{background:var(--success);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.3);}}

.nav-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);}
.tab-btn{flex:1;padding:12px 4px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;border-bottom:3px solid transparent;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn .icon{display:block;font-size:20px;margin-bottom:2px;}

.page{display:none;padding:14px;}.page.active{display:block;}

/* 打卡相機 */
#camBox{position:relative;width:100%;max-width:380px;margin:0 auto 12px;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:3/4;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.face-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:180px;height:220px;border:2px dashed rgba(0,201,167,.6);border-radius:50%;pointer-events:none;}
#camHint{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.8));text-align:center;font-size:13px;color:#fff;}
#flipBtn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:7px 10px;font-size:18px;cursor:pointer;z-index:5;}

.btn{display:block;width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-warn{background:var(--warn);color:#fff;margin-top:8px;}

#resultBox{display:none;text-align:center;padding:14px;border-radius:var(--radius);margin-top:12px;}
#resultBox.ok{background:rgba(0,230,118,.12);border:1px solid var(--success);}
#resultBox.fail{background:rgba(255,107,107,.12);border:1px solid var(--warn);}
#resultName{font-size:22px;font-weight:700;margin:6px 0;}
#resultTime{font-size:13px;color:var(--muted);}
.cbar-wrap{margin:8px 0;}
.cbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.cfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
.clabel{font-size:11px;color:var(--muted);margin-top:3px;}

/* 學員 */
.stu-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:10px;}
.stu-av{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0;}
.stu-ph{width:48px;height:48px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stu-name{font-size:15px;font-weight:600;}
.stu-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.del-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;flex-shrink:0;}

/* Modal */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;overflow-y:auto;padding:16px;}
.modal-box{max-width:400px;margin:0 auto;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-head h2{font-size:16px;}
.close-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
.fg{margin-bottom:12px;}
label.lbl{font-size:13px;color:var(--muted);display:block;margin-bottom:5px;}
input[type=text]{width:100%;padding:11px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:15px;}
input[type=text]:focus{outline:none;border-color:var(--accent);}

/* 照片上傳區 */
.photo-btns{display:flex;gap:10px;margin-bottom:10px;}
.photo-btn{flex:1;text-align:center;padding:13px 6px;border-radius:10px;cursor:pointer;font-size:14px;}
.photo-btn-cam{background:rgba(0,201,167,.1);border:1.5px solid var(--accent);color:var(--accent);}
.photo-btn-gal{background:rgba(255,255,255,.05);border:1.5px solid var(--border);color:var(--text);}
#prevImg{display:none;width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);margin:8px auto;display:none;}
#reBtn{display:none;width:100%;padding:10px;border-radius:9px;background:none;border:1.5px solid var(--warn);color:var(--warn);cursor:pointer;font-size:14px;margin-top:6px;}

/* 紀錄 */
.rec-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid var(--accent);margin-bottom:8px;}
.rec-av{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.rec-name{font-size:14px;font-weight:600;}
.rec-time{font-size:12px;color:var(--muted);}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;background:rgba(0,201,167,.2);color:var(--accent);}

.date-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.date-bar input[type=date]{flex:1;min-width:130px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;}
.date-bar button{padding:8px 12px;border-radius:8px;background:var(--accent);color:#000;border:none;cursor:pointer;font-weight:600;font-size:13px;}
#expBtn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:block;margin-bottom:10px;margin-left:auto;}

/* 統計 */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{background:rgba(255,255,255,.05);border-radius:10px;padding:13px;text-align:center;}
.stat-num{font-size:26px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px;}

/* 載入 */
#loading{position:fixed;inset:0;background:rgba(15,25,35,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.spin{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadTxt{color:var(--muted);font-size:14px;text-align:center;padding:0 20px;}

.empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:14px;}
.empty .ei{font-size:44px;margin-bottom:10px;}
.card2{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px;}
.ctitle{font-size:12px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#fff;padding:9px 18px;border-radius:28px;font-size:13px;z-index:500;opacity:0;transition:opacity .3s;border:1px solid var(--border);white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div id="loadTxt">載入人臉辨識模型中…<br>首次約需 30～60 秒，請稍候</div>
</div>

<header>
  <h1>🏠 學員出席打卡</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="font-size:12px;color:var(--muted)" id="statusLbl">初始化中</span>
    <div class="sdot" id="sdot"></div>
  </div>
</header>

<div class="nav-tabs">
  <button class="tab-btn active" onclick="goTab('checkin',this)"><span class="icon">📷</span>打卡</button>
  <button class="tab-btn" onclick="goTab('students',this)"><span class="icon">👥</span>學員</button>
  <button class="tab-btn" onclick="goTab('records',this)"><span class="icon">📋</span>紀錄</button>
  <button class="tab-btn" onclick="goTab('stats',this)"><span class="icon">📊</span>統計</button>
</div>

<!-- 打卡 -->
<div class="page active" id="page-checkin">
  <div id="camBox">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="face-ring"></div>
    <div id="camHint">請將臉部對準圓框</div>
    <button id="flipBtn" onclick="flipCam()">🔄</button>
  </div>
  <button class="btn btn-primary" id="checkBtn" onclick="doCheckin()" disabled>📸 確認打卡</button>
  <div id="resultBox">
    <div id="resultIcon" style="font-size:38px"></div>
    <div id="resultName"></div>
    <div id="resultTime"></div>
    <div class="cbar-wrap"><div class="cbar"><div class="cfill" id="cfill" style="width:0%"></div></div><div class="clabel" id="clabel"></div></div>
  </div>
</div>

<!-- 學員 -->
<div class="page" id="page-students">
  <button class="btn btn-primary" onclick="openModal()" style="margin-bottom:14px">➕ 新增學員</button>
  <div id="stuList"></div>
</div>

<!-- 紀錄 -->
<div class="page" id="page-records">
  <div class="date-bar">
    <input type="date" id="dateFilter" onchange="renderRec()">
    <button onclick="document.getElementById('dateFilter').value='';renderRec()">全部</button>
  </div>
  <button id="expBtn" onclick="exportCSV()">📥 匯出 Excel</button>
  <div id="recList"></div>
</div>

<!-- 統計 -->
<div class="page" id="page-stats">
  <div class="card2"><div class="ctitle">今日統計</div><div class="stats-grid" id="statsGrid"></div></div>
  <div class="card2"><div class="ctitle">本月出席次數</div><div id="monthStats"></div></div>
</div>

<!-- Modal 新增學員 -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h2>新增學員</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="fg"><label class="lbl">姓名 *</label><input type="text" id="fName" placeholder="學員姓名"></div>
    <div class="fg"><label class="lbl">組別</label><input type="text" id="fGroup" placeholder="例：A組"></div>
    <div class="fg">
      <label class="lbl">人臉照片 *</label>
      <div class="photo-btns">
        <label class="photo-btn photo-btn-cam">
          📷 拍照
          <input type="file" accept="image/*" capture="user" onchange="loadPhoto(event)" style="display:none">
        </label>
        <label class="photo-btn photo-btn-gal">
          🖼 相簿
          <input type="file" accept="image/*" onchange="loadPhoto(event)" style="display:none">
        </label>
      </div>
      <img id="prevImg" alt="預覽">
      <button id="reBtn" onclick="clearPhoto()">🔄 重新選擇</button>
    </div>
    <button class="btn btn-primary" onclick="saveStu()">儲存學員</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 狀態 ──────────────────────────────────────────
let students = JSON.parse(localStorage.getItem('att_s')||'[]');
let records  = JSON.parse(localStorage.getItem('att_r')||'[]');
let faceMatcher = null;
let stream = null;
let camDevices = [];
let camIdx = 0;
let detLoop = null;
let photoData = null;

// ── 初始化 ────────────────────────────────────────
async function init() {
  try {
    const BASE = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(BASE),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(BASE),
      faceapi.nets.faceRecognitionNet.loadFromUri(BASE),
    ]);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('statusLbl').textContent = '就緒';
    document.getElementById('sdot').classList.add('ok');
    await initCam();
    await buildMatcher();
    renderStu(); renderRec(); renderStats();
    document.getElementById('dateFilter').value = toDay();
  } catch(e) {
    document.getElementById('loadTxt').textContent = '❌ 模型載入失敗：' + e.message;
  }
}

// ── 相機（打卡用） ─────────────────────────────────
async function initCam() {
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({video:true});
    tmp.getTracks().forEach(t=>t.stop());
    await new Promise(r=>setTimeout(r,150));
    const all = await navigator.mediaDevices.enumerateDevices();
    camDevices = all.filter(d=>d.kind==='videoinput');
    camIdx = 0;
    await startCam();
  } catch(e) {
    document.getElementById('camHint').textContent = '無法開啟相機：'+e.message;
  }
}

async function startCam() {
  clearInterval(detLoop);
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  const video = document.getElementById('video');
  video.srcObject = null;

  try {
    const dev = camDevices[camIdx];
    const constraints = dev
      ? { video:{ deviceId:{ exact: dev.deviceId } } }
      : { video:true };

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const track = stream.getVideoTracks()[0];
    const s = track.getSettings();
    const isFront = (s.facingMode === 'user') || (camDevices.length > 1 && camIdx === 0);
    video.style.transform = isFront ? 'scaleX(-1)' : 'none';
    document.getElementById('overlay').style.transform = isFront ? 'scaleX(-1)' : 'none';

    // 多重保險：同時用 onloadedmetadata、oncanplay、以及延遲 play()
    let started = false;
    const tryStart = () => {
      if (started) return; started = true;
      video.play().catch(()=>{});
      runDetect();
    };
    video.onloadedmetadata = tryStart;
    video.oncanplay = tryStart;
    video.srcObject = stream;
    // 300ms 後強制啟動（保險用）
    setTimeout(tryStart, 300);
  } catch(e) {
    document.getElementById('camHint').textContent = '無法開啟相機：'+e.message;
  }
}

async function flipCam() {
  if (camDevices.length < 2) { toast('此裝置只有一個鏡頭'); return; }
  camIdx = (camIdx + 1) % camDevices.length;
  await startCam();
}

function runDetect() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const opts = new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.5});
  detLoop = setInterval(async()=>{
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const dets = await faceapi.detectAllFaces(video,opts).withFaceLandmarks(true);
    const btn = document.getElementById('checkBtn');
    if (dets.length > 0) {
      faceapi.draw.drawDetections(canvas, dets);
      btn.disabled = false;
      document.getElementById('camHint').textContent = '✅ 偵測到臉部，請按打卡';
    } else {
      btn.disabled = true;
      document.getElementById('camHint').textContent = '請將臉部對準圓框';
    }
  }, 500);
}

// ── 打卡 ──────────────────────────────────────────
async function doCheckin() {
  const video = document.getElementById('video');
  const btn = document.getElementById('checkBtn');
  btn.disabled = true; btn.textContent = '辨識中…';
  const opts = new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.5});
  const det = await faceapi.detectSingleFace(video,opts).withFaceLandmarks(true).withFaceDescriptor();
  if (!det) { showResult(false,'未偵測到臉部','請重新對準鏡頭',0); reset(); return; }
  if (!faceMatcher) { showResult(false,'尚未建立學員資料','請先新增學員',0); reset(); return; }
  const match = faceMatcher.findBestMatch(det.descriptor);
  const conf = Math.max(0, Math.round((1-match.distance)*100));
  if (match.label==='unknown'||conf<45) { showResult(false,'辨識失敗','找不到符合學員（相似度：'+conf+'%）',conf); reset(); return; }
  const stu = students.find(s=>s.id===match.label);
  if (!stu) { showResult(false,'系統錯誤','找不到學員資料',0); reset(); return; }
  const now = new Date();
  records.unshift({id:Date.now()+'',studentId:stu.id,studentName:stu.name,studentGroup:stu.group||'',studentPhoto:stu.photoData,time:now.toISOString()});
  saveRec();
  showResult(true,stu.name,fmtDT(now)+'　相似度：'+conf+'%',conf);
  setTimeout(reset, 4000);
}
function reset(){ const btn=document.getElementById('checkBtn'); btn.textContent='📸 確認打卡'; btn.disabled=false; }
function showResult(ok,name,time,conf){
  const b=document.getElementById('resultBox');
  b.style.display='block'; b.className=ok?'ok':'fail';
  document.getElementById('resultIcon').textContent=ok?'✅':'❌';
  document.getElementById('resultName').textContent=name;
  document.getElementById('resultTime').textContent=time;
  document.getElementById('cfill').style.width=conf+'%';
  document.getElementById('clabel').textContent='辨識信心度：'+conf+'%';
  if(ok) toast('✅ '+name+' 打卡成功！');
}

// ── FaceMatcher ───────────────────────────────────
async function buildMatcher(){
  if (!students.length){ faceMatcher=null; return; }
  const opts = new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.3});
  const descs = [];
  for(const s of students){
    if(!s.photoData) continue;
    try{
      const img = await loadImg(s.photoData);
      const d = await faceapi.detectSingleFace(img,opts).withFaceLandmarks(true).withFaceDescriptor();
      if(d) descs.push(new faceapi.LabeledFaceDescriptors(s.id,[d.descriptor]));
    }catch(e){}
  }
  faceMatcher = descs.length ? new faceapi.FaceMatcher(descs,0.55) : null;
}
function loadImg(src){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }

// ── 學員管理 ──────────────────────────────────────
function renderStu(){
  const el=document.getElementById('stuList');
  if(!students.length){ el.innerHTML='<div class="empty"><div class="ei">👤</div>尚未新增學員</div>'; return; }
  el.innerHTML=students.map(s=>`
    <div class="stu-item">
      ${s.photoData?`<img class="stu-av" src="${s.photoData}">`:'<div class="stu-ph">👤</div>'}
      <div style="flex:1">
        <div class="stu-name">${s.name}</div>
        <div class="stu-meta">${s.group||'未設定組別'} ｜ 人臉${s.photoData?'✅':'❌'}</div>
      </div>
      <button class="del-btn" onclick="delStu('${s.id}')">🗑</button>
    </div>`).join('');
}
function delStu(id){
  if(!confirm('確定刪除？')) return;
  students=students.filter(s=>s.id!==id);
  saveStuData(); buildMatcher(); renderStu(); toast('已刪除');
}
function openModal(){
  document.getElementById('modal').style.display='block';
  document.getElementById('fName').value='';
  document.getElementById('fGroup').value='';
  clearPhoto();
}
function closeModal(){ document.getElementById('modal').style.display='none'; }
function loadPhoto(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    photoData=ev.target.result;
    const img=document.getElementById('prevImg');
    img.src=photoData; img.style.display='block';
    document.getElementById('reBtn').style.display='block';
  };
  r.readAsDataURL(f);
}
function clearPhoto(){
  photoData=null;
  document.getElementById('prevImg').style.display='none';
  document.getElementById('reBtn').style.display='none';
}
async function saveStu(){
  const name=document.getElementById('fName').value.trim();
  if(!name){ toast('❌ 請輸入姓名'); return; }
  if(!photoData){ toast('❌ 請提供照片'); return; }
  toast('⏳ 分析照片中…');
  const img=await loadImg(photoData);
  const opts=new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:0.3});
  const det=await faceapi.detectSingleFace(img,opts);
  if(!det){ toast('❌ 照片未偵測到臉部，請重新拍照'); return; }
  const stu={id:'S'+Date.now(),name,group:document.getElementById('fGroup').value.trim(),photoData,createdAt:new Date().toISOString()};
  students.push(stu);
  saveStuData();
  await buildMatcher();
  renderStu(); closeModal(); toast('✅ 已新增：'+name);
}

// ── 紀錄 ──────────────────────────────────────────
function renderRec(){
  const el=document.getElementById('recList');
  const df=document.getElementById('dateFilter').value;
  const list=df?records.filter(r=>r.time.startsWith(df)):records;
  if(!list.length){ el.innerHTML='<div class="empty"><div class="ei">📋</div>尚無打卡紀錄</div>'; return; }
  el.innerHTML=list.map(r=>`
    <div class="rec-item">
      ${r.studentPhoto?`<img class="rec-av" src="${r.studentPhoto}">`:'<div style="width:34px;height:34px;border-radius:50%;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;">👤</div>'}
      <div style="flex:1"><div class="rec-name">${r.studentName}</div><div class="rec-time">${r.studentGroup?r.studentGroup+'　':''}${fmtDT(new Date(r.time))}</div></div>
      <span class="badge">簽到</span>
    </div>`).join('');
}
function exportCSV(){
  const df=document.getElementById('dateFilter').value;
  const list=df?records.filter(r=>r.time.startsWith(df)):records;
  if(!list.length){ toast('❌ 無資料'); return; }
  const BOM='\uFEFF';
  const rows=list.map(r=>{ const d=new Date(r.time); return [r.studentName,r.studentGroup||'',d.toLocaleDateString('zh-TW'),d.toLocaleTimeString('zh-TW'),'簽到'].map(v=>`"${v}"`).join(','); });
  const csv=BOM+['姓名,組別,日期,時間,類型',...rows].join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),download:`出席紀錄_${df||'全部'}.csv`});
  a.click(); toast('✅ 匯出成功');
}

// ── 統計 ──────────────────────────────────────────
function renderStats(){
  const td=toDay();
  const todayR=records.filter(r=>r.time.startsWith(td));
  const uniq=[...new Set(todayR.map(r=>r.studentId))].length;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-num">${uniq}</div><div class="stat-lbl">今日出席人數</div></div>
    <div class="stat-card"><div class="stat-num">${students.length}</div><div class="stat-lbl">學員總數</div></div>
    <div class="stat-card"><div class="stat-num">${todayR.length}</div><div class="stat-lbl">今日打卡次數</div></div>
    <div class="stat-card"><div class="stat-num">${records.length}</div><div class="stat-lbl">累計紀錄</div></div>`;
  const mon=new Date().toISOString().slice(0,7);
  const monR=records.filter(r=>r.time.startsWith(mon));
  const ps={};
  students.forEach(s=>{ps[s.id]={name:s.name,c:0};});
  monR.forEach(r=>{ if(ps[r.studentId]) ps[r.studentId].c++; });
  const rows=Object.values(ps).sort((a,b)=>b.c-a.c);
  const mx=Math.max(...rows.map(r=>r.c),1);
  document.getElementById('monthStats').innerHTML=rows.length
    ? rows.map(r=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${r.name}</span><span style="color:var(--accent)">${r.c} 次</span></div><div class="cbar"><div class="cfill" style="width:${Math.round(r.c/mx*100)}%"></div></div></div>`).join('')
    : '<div class="empty">尚無本月資料</div>';
}

// ── 工具 ──────────────────────────────────────────
function goTab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='records') renderRec();
  if(name==='stats') renderStats();
}
function saveStuData(){ localStorage.setItem('att_s',JSON.stringify(students)); }
function saveRec(){ localStorage.setItem('att_r',JSON.stringify(records)); }
function toDay(){ return new Date().toISOString().slice(0,10); }
function fmtDT(d){ return d.toLocaleDateString('zh-TW')+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3000); }

function waitFaceApi(cb){ typeof faceapi!=='undefined'?cb():setTimeout(()=>waitFaceApi(cb),100); }
window.addEventListener('load',()=>waitFaceApi(init));
</script>
