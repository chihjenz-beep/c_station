<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>學員出席打卡系統</title>
<script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  :root {
    --bg: #0f1923;
    --card: #1a2a3a;
    --accent: #00c9a7;
    --accent2: #0099ff;
    --warn: #ff6b6b;
    --text: #e8f0fe;
    --muted: #8a9bb0;
    --border: #2a3f55;
    --success: #00e676;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  header {
    background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--warn); animation: pulse 1.5s infinite; }
  .status-dot.ready { background: var(--success); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.6;transform:scale(1.3);} }

  /* Nav Tabs */
  .nav-tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1; min-width: 80px;
    padding: 13px 8px;
    background: none; border: none;
    color: var(--muted); font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn .icon { display: block; font-size: 20px; margin-bottom: 2px; }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 14px;
  }
  .card-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* Camera */
  #cameraWrap {
    position: relative;
    width: 100%; max-width: 400px;
    margin: 0 auto 14px;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    aspect-ratio: 3/4;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }
  #overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }
  .face-guide {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 240px;
    border: 2px dashed rgba(0,201,167,0.5);
    border-radius: 50%;
    pointer-events: none;
  }
  .camera-hint {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    text-align: center; font-size: 13px; color: #fff;
  }

  /* Buttons */
  .btn {
    display: block; width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none; cursor: pointer;
    font-size: 15px; font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
  .btn-danger { background: var(--warn); color: #fff; }
  .btn-outline {
    background: none; border: 1.5px solid var(--border);
    color: var(--text); margin-top: 10px;
  }

  /* Result display */
  #resultBox {
    text-align: center; padding: 16px;
    border-radius: var(--radius);
    margin-top: 14px;
    display: none;
  }
  #resultBox.success { background: rgba(0,230,118,0.12); border: 1px solid var(--success); }
  #resultBox.fail { background: rgba(255,107,107,0.12); border: 1px solid var(--warn); }
  #resultBox .result-name { font-size: 22px; font-weight: 700; margin: 6px 0; }
  #resultBox .result-time { font-size: 13px; color: var(--muted); }

  /* Student list */
  .student-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .student-avatar {
    width: 50px; height: 50px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent);
    flex-shrink: 0;
  }
  .student-avatar-placeholder {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .student-info { flex: 1; }
  .student-name { font-size: 15px; font-weight: 600; }
  .student-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .student-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    padding: 6px 10px; cursor: pointer; font-size: 14px;
    transition: all 0.2s;
  }
  .icon-btn:hover { color: var(--warn); border-color: var(--warn); }

  /* Form */
  .form-group { margin-bottom: 14px; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  input[type=text], select {
    width: 100%; padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 15px;
  }
  input[type=text]:focus, select:focus { outline: none; border-color: var(--accent); }

  /* Photo capture */
  #capturePreview {
    width: 120px; height: 120px;
    border-radius: 50%; object-fit: cover;
    border: 3px solid var(--accent);
    display: none; margin: 10px auto;
  }
  .photo-area {
    text-align: center;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
  }
  .photo-area:hover { border-color: var(--accent); }

  /* Records */
  .record-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    margin-bottom: 8px;
  }
  .record-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    object-fit: cover; flex-shrink: 0;
  }
  .record-info { flex: 1; }
  .record-name { font-size: 14px; font-weight: 600; }
  .record-time { font-size: 12px; color: var(--muted); }
  .record-badge {
    font-size: 11px; padding: 3px 8px;
    border-radius: 20px; font-weight: 600;
  }
  .badge-in { background: rgba(0,201,167,0.2); color: var(--accent); }
  .badge-out { background: rgba(255,107,107,0.2); color: var(--warn); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card {
    background: rgba(255,255,255,0.05);
    border-radius: 10px; padding: 14px;
    text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Loading */
  #loadingOverlay {
    position: fixed; inset: 0;
    background: rgba(15,25,35,0.95);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
  }
  .spinner {
    width: 50px; height: 50px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { color: var(--muted); font-size: 14px; }

  /* Date filter */
  .date-bar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .date-bar input[type=date] {
    flex: 1; min-width: 140px; padding: 8px 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
  }
  .date-bar button {
    padding: 8px 14px; border-radius: 8px;
    background: var(--accent); color: #000;
    border: none; cursor: pointer; font-weight: 600; font-size: 13px;
  }

  /* Export btn */
  #exportBtn {
    background: linear-gradient(135deg, #00c9a7, #0099ff);
    color: #fff; border: none;
    padding: 10px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    margin-left: auto; display: block; margin-bottom: 12px;
  }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #1e3a5f; color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 14px; z-index: 200;
    opacity: 0; transition: opacity 0.3s;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Add student camera */
  #addCameraWrap {
    position: relative; width: 200px; height: 200px;
    margin: 0 auto; border-radius: 50%; overflow: hidden;
    background: #000; display: none;
  }
  #addVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

  .confidence-bar-wrap { margin: 8px 0; }
  .confidence-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .confidence-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; }
  .confidence-label { font-size: 11px; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="load-text" id="loadText">載入人臉辨識模型中…</div>
</div>

<!-- Header -->
<header>
  <h1>🏠 學員出席打卡</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="font-size:12px;color:var(--muted)" id="statusLabel">初始化中</span>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<!-- Tabs -->
<div class="nav-tabs">
  <button class="tab-btn active" onclick="switchTab('checkin')">
    <span class="icon">📷</span>打卡
  </button>
  <button class="tab-btn" onclick="switchTab('students')">
    <span class="icon">👥</span>學員
  </button>
  <button class="tab-btn" onclick="switchTab('records')">
    <span class="icon">📋</span>紀錄
  </button>
  <button class="tab-btn" onclick="switchTab('stats')">
    <span class="icon">📊</span>統計
  </button>
</div>

<!-- ===== PAGE: CHECK-IN ===== -->
<div class="page active" id="page-checkin">
  <div id="cameraWrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="face-guide"></div>
    <div class="camera-hint" id="cameraHint">請將臉部對準圓框</div>
    <button onclick="flipCamera()" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:6px 10px;font-size:18px;cursor:pointer;z-index:10;">🔄</button>
  </div>

  <button class="btn btn-primary" id="checkInBtn" onclick="doCheckin()" disabled>
    📸 確認打卡
  </button>

  <div id="resultBox">
    <div id="resultIcon" style="font-size:40px"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-time" id="resultTime"></div>
    <div class="confidence-bar-wrap">
      <div class="confidence-bar"><div class="confidence-fill" id="confBar" style="width:0%"></div></div>
      <div class="confidence-label" id="confLabel"></div>
    </div>
  </div>
</div>

<!-- ===== PAGE: STUDENTS ===== -->
<div class="page" id="page-students">
  <button class="btn btn-primary" onclick="showAddModal()" style="margin-bottom:16px">
    ➕ 新增學員
  </button>
  <div id="studentList"></div>
</div>

<!-- ===== PAGE: RECORDS ===== -->
<div class="page" id="page-records">
  <div class="date-bar">
    <input type="date" id="filterDate" onchange="renderRecords()">
    <button onclick="clearDateFilter()">全部</button>
  </div>
  <button id="exportBtn" onclick="exportExcel()">📥 匯出 Excel</button>
  <div id="recordList"></div>
</div>

<!-- ===== PAGE: STATS ===== -->
<div class="page" id="page-stats">
  <div class="card">
    <div class="card-title">今日統計</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>
  <div class="card">
    <div class="card-title">本月出席率</div>
    <div id="monthlyStats"></div>
  </div>
</div>

<!-- ===== ADD STUDENT MODAL ===== -->
<div id="addModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;overflow-y:auto;padding:20px;">
  <div style="max-width:400px;margin:0 auto;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:17px;">新增學員</h2>
      <button onclick="hideAddModal()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;">✕</button>
    </div>

    <div class="form-group">
      <label>姓名 *</label>
      <input type="text" id="newName" placeholder="請輸入學員姓名">
    </div>
    <div class="form-group">
      <label>組別</label>
      <input type="text" id="newGroup" placeholder="例：A組、日間班">
    </div>

    <!-- Photo section -->
    <div class="form-group">
      <label>人臉照片 *</label>
      <div class="photo-area" id="photoArea" onclick="startAddCamera()">
        <div style="font-size:36px">📷</div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px">點擊開啟相機拍照</div>
      </div>
      <div id="addCameraWrap" style="position:relative;">
        <video id="addVideo" autoplay muted playsinline></video>
        <button onclick="flipAddCamera()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:4px 8px;font-size:16px;cursor:pointer;z-index:10;">🔄</button>
      </div>
      <img id="capturePreview" alt="預覽">
      <button class="btn btn-outline" id="snapBtn" onclick="snapPhoto()" style="display:none;margin-top:10px">📸 拍照</button>
      <button class="btn btn-outline" id="retakeBtn" onclick="retakePhoto()" style="display:none;margin-top:6px;border-color:var(--warn);color:var(--warn)">🔄 重拍</button>

      <div style="margin-top:10px;text-align:center;color:var(--muted);font-size:12px">— 或 —</div>
      <label style="display:block;margin-top:8px;text-align:center;cursor:pointer;color:var(--accent);font-size:14px;">
        📁 從相簿選取
        <input type="file" accept="image/*" onchange="loadPhotoFile(event)" style="display:none">
      </label>
    </div>

    <canvas id="addCanvas" style="display:none"></canvas>
    <button class="btn btn-primary" onclick="saveStudent()">儲存學員</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
let students = JSON.parse(localStorage.getItem('att_students') || '[]');
let records = JSON.parse(localStorage.getItem('att_records') || '[]');
let faceMatcher = null;
let stream = null;
let addStream = null;
let capturedPhotoData = null;
let detectionLoop = null;
let modelsLoaded = false;

// ==================== INIT ====================
async function init() {
  try {
    document.getElementById('loadText').textContent = '載入人臉辨識模型中…（首次約需30秒）';
    const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
    ]);
    modelsLoaded = true;
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('statusLabel').textContent = '就緒';
    document.getElementById('statusDot').classList.add('ready');
    await startCamera();
    await buildFaceMatcher();
    renderStudents();
    renderRecords();
    renderStats();
    document.getElementById('filterDate').value = today();
  } catch(e) {
    document.getElementById('loadText').textContent = '模型載入失敗：' + e.message;
  }
}

// ==================== CAMERA ====================
let currentFacing = 'user';      // 打卡相機
let addCurrentFacing = 'user';   // 新增學員相機

async function startCamera(facing) {
  if (!facing) facing = currentFacing;
  currentFacing = facing;
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  clearInterval(detectionLoop);
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing, width: 640, height: 480 } });
    const video = document.getElementById('video');
    // 前鏡頭水平翻轉，後鏡頭不翻
    video.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    document.getElementById('overlay').style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    video.srcObject = stream;
    await video.play();
    startDetection();
  } catch(e) {
    document.getElementById('cameraHint').textContent = '無法開啟相機：' + e.message;
  }
}

async function flipCamera() {
  currentFacing = currentFacing === 'user' ? 'environment' : 'user';
  await startCamera(currentFacing);
}

async function flipAddCamera() {
  addCurrentFacing = addCurrentFacing === 'user' ? 'environment' : 'user';
  await startAddCamera(addCurrentFacing);
}

function startDetection() {
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
  detectionLoop = setInterval(async () => {
    if (!video.videoWidth) return;
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    const ctx = overlay.getContext('2d');
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    const detections = await faceapi.detectAllFaces(video, opts).withFaceLandmarks(true);
    const btn = document.getElementById('checkInBtn');
    if (detections.length > 0) {
      faceapi.draw.drawDetections(overlay, detections);
      btn.disabled = false;
      document.getElementById('cameraHint').textContent = '✅ 偵測到臉部，請按打卡';
    } else {
      btn.disabled = true;
      document.getElementById('cameraHint').textContent = '請將臉部對準圓框';
    }
  }, 500);
}

// ==================== FACE MATCHER ====================
async function buildFaceMatcher() {
  if (students.length === 0) { faceMatcher = null; return; }
  const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 });
  const labeledDescriptors = [];
  for (const s of students) {
    if (!s.photoData) continue;
    try {
      const img = await loadImage(s.photoData);
      const det = await faceapi.detectSingleFace(img, opts).withFaceLandmarks(true).withFaceDescriptor();
      if (det) {
        labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(s.id, [det.descriptor]));
      }
    } catch(e) { console.warn('Skip student', s.name, e); }
  }
  if (labeledDescriptors.length > 0) {
    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.55);
  } else {
    faceMatcher = null;
  }
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

// ==================== CHECK-IN ====================
async function doCheckin() {
  const video = document.getElementById('video');
  const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
  const btn = document.getElementById('checkInBtn');
  btn.disabled = true;
  btn.textContent = '辨識中…';

  const det = await faceapi.detectSingleFace(video, opts).withFaceLandmarks(true).withFaceDescriptor();

  if (!det) {
    showResult(false, '未偵測到臉部', '請重新對準鏡頭', 0);
    btn.disabled = false; btn.textContent = '📸 確認打卡';
    return;
  }

  if (!faceMatcher) {
    showResult(false, '尚未建立學員資料', '請先在「學員」頁新增學員並拍照', 0);
    btn.disabled = false; btn.textContent = '📸 確認打卡';
    return;
  }

  const match = faceMatcher.findBestMatch(det.descriptor);
  const confidence = Math.max(0, Math.round((1 - match.distance) * 100));

  if (match.label === 'unknown' || confidence < 45) {
    showResult(false, '辨識失敗', '找不到符合的學員（相似度：' + confidence + '%）', confidence);
    btn.disabled = false; btn.textContent = '📸 確認打卡';
    return;
  }

  const student = students.find(s => s.id === match.label);
  if (!student) {
    showResult(false, '系統錯誤', '找不到學員資料', 0);
    btn.disabled = false; btn.textContent = '📸 確認打卡';
    return;
  }

  // Record
  const now = new Date();
  const record = {
    id: Date.now().toString(),
    studentId: student.id,
    studentName: student.name,
    studentGroup: student.group || '',
    studentPhoto: student.photoData,
    time: now.toISOString(),
    type: 'in'
  };
  records.unshift(record);
  saveRecords();

  showResult(true, student.name, formatDateTime(now) + '　相似度：' + confidence + '%', confidence);
  btn.textContent = '📸 確認打卡';
  setTimeout(() => { btn.disabled = false; }, 3000);
}

function showResult(success, name, time, conf) {
  const box = document.getElementById('resultBox');
  box.style.display = 'block';
  box.className = success ? 'success' : 'fail';
  document.getElementById('resultIcon').textContent = success ? '✅' : '❌';
  document.getElementById('resultName').textContent = name;
  document.getElementById('resultTime').textContent = time;
  document.getElementById('confBar').style.width = conf + '%';
  document.getElementById('confLabel').textContent = '辨識信心度：' + conf + '%';
  if (success) showToast('✅ ' + name + ' 打卡成功！');
}

// ==================== STUDENTS ====================
function renderStudents() {
  const el = document.getElementById('studentList');
  if (students.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">👤</div><div>尚未新增任何學員<br>請點上方按鈕新增</div></div>';
    return;
  }
  el.innerHTML = students.map(s => `
    <div class="student-item">
      ${s.photoData
        ? `<img class="student-avatar" src="${s.photoData}" alt="${s.name}">`
        : `<div class="student-avatar-placeholder">👤</div>`}
      <div class="student-info">
        <div class="student-name">${s.name}</div>
        <div class="student-meta">${s.group || '未設定組別'} ｜ 已建立人臉${s.photoData ? '✅' : '❌'}</div>
      </div>
      <div class="student-actions">
        <button class="icon-btn" onclick="deleteStudent('${s.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function deleteStudent(id) {
  if (!confirm('確定刪除此學員？')) return;
  students = students.filter(s => s.id !== id);
  saveStudents();
  buildFaceMatcher();
  renderStudents();
  showToast('已刪除學員');
}

function showAddModal() {
  document.getElementById('addModal').style.display = 'block';
  document.getElementById('newName').value = '';
  document.getElementById('newGroup').value = '';
  capturedPhotoData = null;
  document.getElementById('capturePreview').style.display = 'none';
  document.getElementById('snapBtn').style.display = 'none';
  document.getElementById('retakeBtn').style.display = 'none';
  document.getElementById('addCameraWrap').style.display = 'none';
  document.getElementById('photoArea').style.display = 'block';
}

function hideAddModal() {
  document.getElementById('addModal').style.display = 'none';
  if (addStream) { addStream.getTracks().forEach(t => t.stop()); addStream = null; }
}

async function startAddCamera(facing) {
  if (!facing) facing = addCurrentFacing;
  addCurrentFacing = facing;
  document.getElementById('photoArea').style.display = 'none';
  document.getElementById('addCameraWrap').style.display = 'block';
  document.getElementById('snapBtn').style.display = 'block';
  if (addStream) { addStream.getTracks().forEach(t => t.stop()); }
  addStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing } });
  const addVideo = document.getElementById('addVideo');
  addVideo.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
  addVideo.srcObject = addStream;
  await addVideo.play();
}

function snapPhoto() {
  const video = document.getElementById('addVideo');
  const canvas = document.getElementById('addCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  if (addCurrentFacing === 'user') {
    ctx.save(); ctx.scale(-1, 1); ctx.drawImage(video, -canvas.width, 0); ctx.restore();
  } else {
    ctx.drawImage(video, 0, 0);
  }
  capturedPhotoData = canvas.toDataURL('image/jpeg', 0.8);
  document.getElementById('capturePreview').src = capturedPhotoData;
  document.getElementById('capturePreview').style.display = 'block';
  document.getElementById('addCameraWrap').style.display = 'none';
  document.getElementById('snapBtn').style.display = 'none';
  document.getElementById('retakeBtn').style.display = 'block';
  if (addStream) { addStream.getTracks().forEach(t => t.stop()); addStream = null; }
}

function retakePhoto() {
  capturedPhotoData = null;
  document.getElementById('capturePreview').style.display = 'none';
  document.getElementById('retakeBtn').style.display = 'none';
  document.getElementById('photoArea').style.display = 'block';
}

function loadPhotoFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    capturedPhotoData = e.target.result;
    document.getElementById('capturePreview').src = capturedPhotoData;
    document.getElementById('capturePreview').style.display = 'block';
    document.getElementById('photoArea').style.display = 'none';
    document.getElementById('retakeBtn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function saveStudent() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { showToast('❌ 請輸入姓名'); return; }
  if (!capturedPhotoData) { showToast('❌ 請提供照片'); return; }

  // Verify face in photo
  showToast('⏳ 分析照片中…');
  const img = await loadImage(capturedPhotoData);
  const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 });
  const det = await faceapi.detectSingleFace(img, opts);
  if (!det) {
    showToast('❌ 照片中未偵測到臉部，請重新拍照');
    return;
  }

  const student = {
    id: 'S' + Date.now(),
    name,
    group: document.getElementById('newGroup').value.trim(),
    photoData: capturedPhotoData,
    createdAt: new Date().toISOString()
  };
  students.push(student);
  saveStudents();
  await buildFaceMatcher();
  renderStudents();
  hideAddModal();
  showToast('✅ 學員 ' + name + ' 已新增');
}

// ==================== RECORDS ====================
function renderRecords() {
  const el = document.getElementById('recordList');
  const dateFilter = document.getElementById('filterDate').value;
  let filtered = records;
  if (dateFilter) {
    filtered = records.filter(r => r.time.startsWith(dateFilter));
  }
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>尚無打卡紀錄</div></div>';
    return;
  }
  el.innerHTML = filtered.map(r => `
    <div class="record-item">
      ${r.studentPhoto
        ? `<img class="record-avatar" src="${r.studentPhoto}" alt="">`
        : `<div style="width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0">👤</div>`}
      <div class="record-info">
        <div class="record-name">${r.studentName}</div>
        <div class="record-time">${r.studentGroup ? r.studentGroup + '　' : ''}${formatDateTime(new Date(r.time))}</div>
      </div>
      <span class="record-badge badge-in">簽到</span>
    </div>
  `).join('');
}

function clearDateFilter() {
  document.getElementById('filterDate').value = '';
  renderRecords();
}

// ==================== STATS ====================
function renderStats() {
  const todayStr = today();
  const todayRecords = records.filter(r => r.time.startsWith(todayStr));
  const uniqueToday = [...new Set(todayRecords.map(r => r.studentId))].length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${uniqueToday}</div><div class="stat-label">今日出席人數</div></div>
    <div class="stat-card"><div class="stat-num">${students.length}</div><div class="stat-label">學員總數</div></div>
    <div class="stat-card"><div class="stat-num">${todayRecords.length}</div><div class="stat-label">今日打卡次數</div></div>
    <div class="stat-card"><div class="stat-num">${records.length}</div><div class="stat-label">累計打卡紀錄</div></div>
  `;

  // Monthly per-student stats
  const now = new Date();
  const monthStr = now.toISOString().slice(0, 7);
  const monthRecs = records.filter(r => r.time.startsWith(monthStr));
  const perStudent = {};
  students.forEach(s => { perStudent[s.id] = { name: s.name, count: 0 }; });
  monthRecs.forEach(r => {
    if (perStudent[r.studentId]) perStudent[r.studentId].count++;
  });

  const rows = Object.values(perStudent).sort((a, b) => b.count - a.count);
  if (rows.length === 0) {
    document.getElementById('monthlyStats').innerHTML = '<div class="empty-state">尚無本月資料</div>';
    return;
  }
  const maxCount = Math.max(...rows.map(r => r.count), 1);
  document.getElementById('monthlyStats').innerHTML = rows.map(r => `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span>${r.name}</span><span style="color:var(--accent)">${r.count} 次</span>
      </div>
      <div class="confidence-bar">
        <div class="confidence-fill" style="width:${Math.round(r.count/maxCount*100)}%"></div>
      </div>
    </div>
  `).join('');
}

// ==================== EXPORT ====================
function exportExcel() {
  const dateFilter = document.getElementById('filterDate').value;
  let filtered = records;
  if (dateFilter) filtered = records.filter(r => r.time.startsWith(dateFilter));

  if (filtered.length === 0) { showToast('❌ 無資料可匯出'); return; }

  // Build CSV (UTF-8 BOM for Excel)
  const BOM = '\uFEFF';
  const header = ['姓名', '組別', '日期', '時間', '類型'];
  const rows = filtered.map(r => {
    const d = new Date(r.time);
    return [
      r.studentName,
      r.studentGroup || '',
      d.toLocaleDateString('zh-TW'),
      d.toLocaleTimeString('zh-TW'),
      '簽到'
    ];
  });
  const csv = BOM + [header, ...rows].map(row => row.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `出席紀錄_${dateFilter || '全部'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 已匯出 CSV（可用 Excel 開啟）');
}

// ==================== UTILS ====================
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'records') renderRecords();
  if (name === 'stats') renderStats();
}

function saveStudents() { localStorage.setItem('att_students', JSON.stringify(students)); }
function saveRecords() { localStorage.setItem('att_records', JSON.stringify(records)); }
function today() { return new Date().toISOString().slice(0, 10); }
function formatDateTime(d) {
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ==================== START ====================
window.addEventListener('load', init);
</script>
